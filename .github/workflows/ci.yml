name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

env:
  APP_NAME: shopflow-catalog-api

jobs:
  test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test

  preview-deploy:
    needs: test
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency: preview-${{ github.event.pull_request.number }}
    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ensure preview app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_ORG_TOKEN }}
        run: |
          PREVIEW="${APP_NAME}-pr-${{ github.event.pull_request.number }}"
          if ! flyctl status -a "$PREVIEW" >/dev/null 2>&1; then
            flyctl apps create "$PREVIEW" --org personal
          fi
      - name: Deploy preview
        id: deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_ORG_TOKEN }}
        run: |
          PREVIEW="${APP_NAME}-pr-${{ github.event.pull_request.number }}"
          flyctl deploy --remote-only --ha=false --app "$PREVIEW"
          echo "url=https://${PREVIEW}.fly.dev" >> "$GITHUB_OUTPUT"

  preview-smoke:
    needs: preview-deploy
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ needs.preview-deploy.outputs.preview_url }}
    steps:
      - name: Health check
        run: curl -sf --retry 5 --retry-delay 5 --retry-all-errors "$APP_URL/health"

      - name: GET /products retorna array não-vazio
        run: |
          BODY=$(curl -sf "$APP_URL/products")
          echo "$BODY" | jq -e '.items | type == "array"' >/dev/null
          COUNT=$(echo "$BODY" | jq '.items | length')
          test "$COUNT" -gt 0

      - name: Busca por termo retorna resultados
        run: |
          COUNT=$(curl -sf "$APP_URL/products?q=t%C3%AAnis" | jq '.items | length')
          test "$COUNT" -gt 0

  preview-cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Destroy preview app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_ORG_TOKEN }}
        run: |
          PREVIEW="${APP_NAME}-pr-${{ github.event.pull_request.number }}"
          flyctl apps destroy "$PREVIEW" --yes || true

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      APP_URL: https://shopflow-catalog-api.fly.dev
    steps:
      - name: Health check
        run: curl -sf --retry 5 --retry-delay 5 --retry-all-errors "$APP_URL/health"

      - name: GET /products retorna array não-vazio
        run: |
          BODY=$(curl -sf "$APP_URL/products")
          echo "$BODY" | jq -e '.items | type == "array"' >/dev/null
          COUNT=$(echo "$BODY" | jq '.items | length')
          test "$COUNT" -gt 0

      - name: Busca por termo retorna resultados
        run: |
          COUNT=$(curl -sf "$APP_URL/products?q=t%C3%AAnis" | jq '.items | length')
          test "$COUNT" -gt 0
