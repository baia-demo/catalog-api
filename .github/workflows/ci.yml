name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  APP_URL: https://shopflow-catalog-api.fly.dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: curl -sf --retry 5 --retry-delay 5 --retry-all-errors "$APP_URL/health"

      - name: GET /products retorna array não-vazio
        run: |
          BODY=$(curl -sf "$APP_URL/products")
          echo "$BODY" | jq -e '.items | type == "array"' >/dev/null
          COUNT=$(echo "$BODY" | jq '.items | length')
          echo "Produtos no catálogo: $COUNT"
          test "$COUNT" -gt 0

      - name: Busca por termo retorna resultados
        run: |
          COUNT=$(curl -sf "$APP_URL/products?q=t%C3%AAnis" | jq '.items | length')
          echo "Hits pra 'tênis': $COUNT"
          test "$COUNT" -gt 0
